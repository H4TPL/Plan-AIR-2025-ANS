<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Plan Studencki</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">

    <style>
        /* =========================================
           1. ZMIENNE CSS (Kolory i motywy)
           ========================================= */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-radius: 16px;
            --card-shadow: 0 4px 6px rgba(0,0,0,0.05);
            --modal-bg: rgba(0,0,0,0.5);
            --toggle-bg: #e5e7eb;
            --danger: #ef4444;
            
            /* Kolory tagów zajęć */
            --tag-wyklad: #3b82f6;
            --tag-cwiczenia: #10b981;
            --tag-lab: #f59e0b;
            --tag-projekt: #8b5cf6;
            --tag-seminarium: #ec4899;
        }

        body.dark-mode {
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --bg-color: #111827;
            --card-bg: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.3);
            --modal-bg: rgba(0,0,0,0.7);
            --toggle-bg: #374151;
        }

        /* =========================================
           2. STYLE GLOBALNE
           ========================================= */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            padding: 20px; 
            transition: background-color 0.3s, color 0.3s; 
        }

        /* =========================================
           3. NAGŁÓWEK I KONTROLKI (Header)
           ========================================= */
        header { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            margin-bottom: 25px; 
        }
        
        .top-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 15px; 
        }
        
        h1 { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 1.8rem; 
            font-weight: 700; 
        }
        
        .controls { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            align-items: center; 
        }
        
        .search-bar { 
            position: relative; 
            display: flex; 
            align-items: center; 
        }
        
        .search-bar i { 
            position: absolute; 
            left: 12px; 
            color: var(--text-muted); 
        }
        
        .search-bar input { 
            padding: 10px 10px 10px 35px; 
            border-radius: 10px; 
            border: 1px solid var(--toggle-bg); 
            background: var(--card-bg); 
            color: var(--text-main); 
            outline: none; 
            transition: 0.2s; 
        }
        
        .search-bar input:focus { 
            border-color: var(--primary); 
        }

        .btn { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px 16px; 
            border-radius: 10px; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            font-weight: 600; 
            transition: 0.2s; 
        }
        
        .btn:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); 
        }
        
        .btn-outline { 
            background-color: transparent; 
            border: 2px solid var(--primary); 
            color: var(--primary); 
        }
        
        .btn-outline:hover { 
            background-color: var(--primary); 
            color: white; 
        }
        
        .btn-icon { 
            padding: 10px; 
            border-radius: 50%; 
            aspect-ratio: 1; 
            justify-content: center;
        }

        /* Widget Następne Zajęcia */
        #next-class-widget { 
            background: linear-gradient(135deg, var(--primary), var(--primary-hover)); 
            color: white; 
            padding: 20px; 
            border-radius: var(--border-radius); 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2); 
            animation: slideDown 0.5s ease-out; 
        }
        
        #next-class-widget i { font-size: 2rem; }
        .widget-content h3 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; margin-bottom: 5px; }
        .widget-content p { font-size: 1.2rem; font-weight: bold; }

        /* Nawigacja Kalendarzowa (Wehikuł Czasu) */
        .calendar-nav { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            background: var(--card-bg); 
            padding: 10px 20px; 
            border-radius: 12px; 
            box-shadow: var(--card-shadow); 
            width: fit-content; 
            margin: 0 auto; 
            flex-wrap: wrap;
        }
        
        .calendar-nav button { 
            background: var(--toggle-bg); 
            border: none; 
            padding: 8px 15px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            color: var(--text-main); 
            transition: 0.2s; 
        }
        
        .calendar-nav button:hover { 
            background: var(--primary); 
            color: white; 
        }
        
        .current-week-display { 
            font-size: 1.1rem; 
            font-weight: bold; 
            color: var(--primary); 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        
        .date-picker-wrapper { 
            position: relative; 
            display: inline-block; 
            cursor: pointer; 
        }
        
        .date-picker-wrapper input[type="date"] { 
            position: absolute; 
            opacity: 0; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            cursor: pointer; 
        }

        /* =========================================
           4. SIATKA KALENDARZA
           ========================================= */
        .calendar-container { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; 
        }
        
        .day-column { 
            background: var(--card-bg); 
            border-radius: var(--border-radius); 
            padding: 15px; 
            box-shadow: var(--card-shadow); 
            min-height: 60vh; 
            display: flex; 
            flex-direction: column; 
            transition: 0.3s;
        }
        
        .day-title { 
            text-align: center; 
            font-weight: 700; 
            font-size: 1rem; 
            margin-bottom: 15px; 
            color: var(--primary); 
            padding-bottom: 10px; 
            border-bottom: 2px solid var(--toggle-bg);
        }
        
        .date-subtitle { 
            display: block; 
            font-size: 0.8rem; 
            color: var(--text-muted); 
            font-weight: normal; 
            margin-top: 5px; 
        }
        
        .week-type-indicator { 
            font-size: 0.75rem; 
            padding: 2px 6px; 
            border-radius: 4px; 
            background: var(--toggle-bg); 
            margin-top: 5px; 
            display: inline-block; 
        }

        /* Karta Zajęć */
        .class-card { 
            background: var(--bg-color); 
            border-left: 5px solid var(--primary); 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            position: relative; 
            transition: all 0.2s; 
        }
        
        .class-card:hover { 
            transform: scale(1.02); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        
        .class-time { 
            font-weight: 700; 
            font-size: 0.9rem; 
            color: var(--primary); 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            margin-bottom: 8px;
        }
        
        .class-subject { 
            font-size: 1.05rem; 
            font-weight: 600; 
            margin-bottom: 8px; 
            line-height: 1.3; 
            cursor: pointer;
        }
        
        .class-details { 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            display: flex; 
            flex-direction: column; 
            gap: 5px; 
            margin-bottom: 10px; 
            cursor: pointer;
        }

        /* Przyciski Akcji na Karcie (Edytuj/Usuń) */
        .card-actions { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            display: none; 
            gap: 5px; 
        }
        
        .class-card:hover .card-actions { 
            display: flex; 
        }
        
        .action-btn { 
            background: var(--toggle-bg); 
            color: var(--text-main); 
            border: none; 
            border-radius: 6px; 
            width: 28px; 
            height: 28px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.2s; 
        }
        
        .action-btn:hover { 
            background: var(--primary); 
            color: white; 
        }
        
        .btn-del:hover { 
            background: var(--danger); 
            color: white; 
        }

        /* Tagi i Paski Postępu */
        .type-badge { 
            display: inline-block; 
            padding: 3px 8px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: bold; 
            color: white; 
            margin-bottom: 8px; 
        }
        .tag-wyklad { background-color: var(--tag-wyklad); } 
        .tag-cwiczenia { background-color: var(--tag-cwiczenia); } 
        .tag-lab { background-color: var(--tag-lab); } 
        .tag-projekt { background-color: var(--tag-projekt); } 
        .tag-seminarium { background-color: var(--tag-seminarium); } 
        .tag-inne { background-color: var(--text-muted); }

        .special-term { 
            color: #ef4444; 
            font-weight: bold; 
            font-size: 0.75rem; 
            margin-top: 5px; 
            display: inline-block; 
        }
        
        .empty-day { 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 0.9rem; 
            margin-top: 20px; 
            font-style: italic; 
        }

        .progress-container { 
            width: 100%; 
            background: var(--toggle-bg); 
            height: 6px; 
            border-radius: 3px; 
            margin-top: 10px; 
            overflow: hidden; 
            display: none; 
        }
        
        .progress-bar { 
            height: 100%; 
            background: #10b981; 
            width: 0%; 
            transition: width 1s linear; 
        }
        
        .class-card.ongoing { 
            border-color: #10b981; 
            background: rgba(16, 185, 129, 0.05); 
        }
        
        .class-card.ongoing .progress-container { display: block; }
        .class-card.ongoing .class-time { color: #10b981; }

        /* Notatki */
        .notes-section { 
            margin-top: 10px; 
            padding-top: 10px; 
            border-top: 1px dashed var(--text-muted); 
            display: none; 
        }
        
        .notes-section.active { display: block; }
        
        .notes-textarea { 
            width: 100%; 
            background: var(--card-bg); 
            color: var(--text-main); 
            border: 1px solid var(--toggle-bg); 
            border-radius: 6px; 
            padding: 8px; 
            font-size: 0.85rem; 
            resize: vertical; 
            min-height: 60px; 
            margin-bottom: 5px; 
        }
        
        .notes-save-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 5px 10px; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            cursor: pointer; 
        }

        /* =========================================
           5. MODALE (Wyskakujące Okienka)
           ========================================= */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--modal-bg); 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            backdrop-filter: blur(4px); 
        }
        
        .modal-content { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: var(--border-radius); 
            width: 90%; 
            max-width: 450px; 
            max-height: 90vh; 
            overflow-y: auto; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            animation: slideDown 0.3s ease-out;
        }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        .modal-content input, .modal-content select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--toggle-bg); 
            background: var(--bg-color); 
            color: var(--text-main); 
            border-radius: 8px; 
            font-size: 1rem; 
            outline: none; 
        }
        
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn-cancel { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); }

        #qrcode { display: flex; justify-content: center; margin: 20px 0; background: white; padding: 15px; border-radius: 10px; }

        /* =========================================
           6. RESPONSYWNOŚĆ (Media Queries)
           ========================================= */
        @media (max-width: 1024px) { 
            .calendar-container { grid-template-columns: repeat(3, 1fr); } 
        }
        @media (max-width: 768px) {
            .calendar-container { grid-template-columns: 1fr; }
            .top-bar { flex-direction: column; align-items: flex-start; }
            .controls { width: 100%; justify-content: space-between; }
            .search-bar { width: 100%; }
            .search-bar input { width: 100%; }
            .class-card .card-actions { display: flex; } /* Zawsze widoczne na mobile */
        }
        
        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <header>
        <div class="top-bar">
            <h1><i class="fas fa-graduation-cap"></i> Smart Plan</h1>
            
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Szukaj przedmiotu, sali..." oninput="renderCalendar()">
            </div>
            
            <div class="controls">
                <button class="btn btn-icon btn-outline" onclick="toggleDarkMode()" title="Zmień motyw">
                    <i class="fas fa-moon" id="theme-icon"></i>
                </button>
                <button class="btn btn-outline" onclick="exportICS()" title="Eksportuj (.ics)">
                    <i class="far fa-calendar-plus"></i> .ics
                </button>
                <button class="btn btn-outline" onclick="showQRCode()" title="Udostępnij Kodem QR">
                    <i class="fas fa-qrcode"></i> QR
                </button>
                <button class="btn btn-outline" onclick="jumpToToday()">Dziś</button>
                <button class="btn" onclick="openModal()"><i class="fas fa-plus"></i> Dodaj</button>
            </div>
        </div>
        
        <div id="next-class-widget" style="display: none;">
            <i class="fas fa-rocket"></i>
            <div class="widget-content">
                <h3>Następne zajęcia</h3>
                <p id="next-class-text">Ładowanie...</p>
            </div>
        </div>
        
        <div class="calendar-nav">
            <button onclick="changeWeek(-1)"><i class="fas fa-chevron-left"></i> Poprzedni</button>
            <div class="current-week-display">
                <span id="week-label">Ładowanie...</span>
                <div class="date-picker-wrapper">
                    <button class="btn btn-icon btn-outline" style="padding: 5px;">
                        <i class="far fa-calendar-alt"></i>
                    </button>
                    <input type="date" id="date-picker" onchange="jumpToDate(event)">
                </div>
            </div>
            <button onclick="changeWeek(1)">Następny <i class="fas fa-chevron-right"></i></button>
        </div>
    </header>

    <div class="calendar-container" id="calendar">
        </div>

    <div class="modal" id="classModal">
        <div class="modal-content">
            <h2 id="modalTitle">Dodaj zajęcia</h2>
            
            <input type="hidden" id="editClassIndex" value="-1">
            <input type="hidden" id="editDayIndex" value="-1">

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Typ tygodnia</label>
                    <select id="weekTypeSelect">
                        <option value="TN">Nieparzysty (TN)</option>
                        <option value="TP">Parzysty (TP)</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Dzień tygodnia</label>
                    <select id="daySelect">
                        <option value="0">Poniedziałek</option>
                        <option value="1">Wtorek</option>
                        <option value="2">Środa</option>
                        <option value="3">Czwartek</option>
                        <option value="4">Piątek</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Typ zajęć (Kolor tagu)</label>
                <select id="classType">
                    <option value="wyklad">Wykład</option>
                    <option value="cwiczenia">Ćwiczenia</option>
                    <option value="lab">Laboratorium</option>
                    <option value="projekt">Projekt</option>
                    <option value="seminarium">Seminarium</option>
                    <option value="inne">Inne</option>
                </select>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>Od</label>
                    <input type="time" id="timeStart" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Do</label>
                    <input type="time" id="timeEnd" required>
                </div>
            </div>

            <div class="form-group">
                <label>Przedmiot</label>
                <input type="text" id="subject" placeholder="np. Robotyka" required>
            </div>
            
            <div class="form-group">
                <label>Sala / Budynek</label>
                <input type="text" id="room" placeholder="np. sala 202t">
            </div>

            <div class="form-group">
                <label>Prowadzący</label>
                <input type="text" id="lecturer" placeholder="np. dr inż. Kowalski">
            </div>
            
            <div class="form-group">
                <label>Konkretne daty (Opcjonalnie)</label>
                <input type="text" id="specificDates" placeholder="np. 2026-03-09, 2026-03-23 (po przecinku)">
                <small style="color: var(--text-muted); font-size: 0.75rem;">Zostaw puste, jeśli zajęcia są co tydzień.</small>
            </div>

            <div class="modal-buttons">
                <button class="btn btn-cancel" onclick="closeModal()">Anuluj</button>
                <button class="btn" onclick="saveClass()" id="saveBtn">Zapisz</button>
            </div>
        </div>
    </div>

    <div class="modal" id="qrModal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()" style="text-align: center;">
            <h2>Zeskanuj plan</h2>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px;">
                Daj znajomemu zeskanować ten kod aparatem, aby pobrał Twój plik z planem zajęć.
            </p>
            <div id="qrcode"></div>
            <button class="btn btn-outline" onclick="document.getElementById('qrModal').style.display='none'">Zamknij</button>
        </div>
    </div>

                ],
                1: [ 
                    { start: "15:30", end: "17:00", subject: "Projektowanie linii...", type: "projekt", room: "18t", lecturer: "mgr inż. M.Wadelski", specificDates: [], notes: "" }, 
                    { start: "17:10", end: "19:25", subject: "Rapid Prototyping", type: "lab", room: "207t", lecturer: "mgr inż. R.Bajdek", specificDates: ['2026-03-17', '2026-03-31', '2026-04-14', '2026-04-28', '2026-05-12'], notes: "" } 
                ],
                2: [ 
                    { start: "09:45", end: "11:15", subject: "Rapid Prototyping (wyk.)", type: "wyklad", room: "109t", lecturer: "dr inż. R.Cieślak", specificDates: [], notes: "" }, 
                    { start: "13:00", end: "16:00", subject: "Projektowanie chwytaków (wyk.)", type: "wyklad", room: "18t", lecturer: "dr inż. A.Myszkowski", specificDates: ['2026-03-04', '2026-03-18', '2026-04-01', '2026-04-15'], notes: "" }, 
                    { start: "16:15", end: "19:15", subject: "Projektowanie chwytaków", type: "projekt", room: "18t", lecturer: "dr inż. A.Myszkowski", specificDates: ['2026-03-04', '2026-03-18', '2026-04-01', '2026-04-15'], notes: "" } 
                ],
                3: [], 4: []
            }
        };

        // Ładowanie z LocalStorage lub użycie domyślnych
        let scheduleData = JSON.parse(localStorage.getItem('smartPlanData')) || defaultData;
        
        // Stan nawigacji kalendarza
        let viewDateStart = getMonday(new Date()); 

        function saveData() {
            localStorage.setItem('smartPlanData', JSON.stringify(scheduleData));
        }

        // --- FUNKCJE POMOCNICZE DAT ---
        function getMonday(d) {
            d = new Date(d);
            var day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        function formatDateStr(dateObj) {
            const tzOffset = dateObj.getTimezoneOffset() * 60000;
            return (new Date(dateObj - tzOffset)).toISOString().split('T')[0];
        }

        function getWeekTypeForDate(dateObj) {
            const mondayStr = formatDateStr(getMonday(dateObj));
            if (tnWeeksStarts.includes(mondayStr)) return 'TN';
            if (tpWeeksStarts.includes(mondayStr)) return 'TP';
            return 'INNY';
        }

        // --- RENDEROWANIE KALENDARZA ---
        function renderCalendar() {
            const calendar = document.getElementById('calendar'); 
            calendar.innerHTML = '';
            
            const daysNames = ['Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek'];
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const now = new Date();
            const todayStr = formatDateStr(now);
            const currentMins = now.getHours() * 60 + now.getMinutes();

            // Aktualizacja etykiety tygodnia
            const friday = new Date(viewDateStart); 
            friday.setDate(viewDateStart.getDate() + 4);
            document.getElementById('week-label').innerText = `${viewDateStart.getDate()}.${viewDateStart.getMonth()+1} - ${friday.getDate()}.${friday.getMonth()+1}.${friday.getFullYear()}`;

            for (let i = 0; i < 5; i++) {
                const column = document.createElement('div'); 
                column.className = 'day-column';
                
                const columnDateObj = new Date(viewDateStart);
                columnDateObj.setDate(viewDateStart.getDate() + i);
                const columnDateStr = formatDateStr(columnDateObj);
                
                const weekType = getWeekTypeForDate(columnDateObj);
                const weekTypeLabel = weekType === 'INNY' ? 'Brak zajęć' : (weekType === 'TN' ? 'Nieparzysty (TN)' : 'Parzysty (TP)');
                const colorMarker = weekType === 'INNY' ? '#9ca3af' : (weekType === 'TN' ? '#3b82f6' : '#10b981');
                
                const isToday = (columnDateStr === todayStr);

                column.innerHTML = `
                    <div class="day-title" style="${isToday ? 'background: rgba(79, 70, 229, 0.1); border-radius: 8px;' : ''}">
                        ${daysNames[i]}
                        <span class="date-subtitle">${columnDateObj.getDate()}.${columnDateObj.getMonth()+1}.${columnDateObj.getFullYear()}</span>
                        <span class="week-type-indicator" style="color: ${colorMarker}; border: 1px solid ${colorMarker}">${weekTypeLabel}</span>
                    </div>
                `;

                let classesRendered = 0;

                if (weekType !== 'INNY') {
                    let classes = scheduleData[weekType][i];
                    
                    // Sortowanie po godzinie
                    classes.sort((a, b) => a.start.localeCompare(b.start));
                    
                    classes.forEach((cls, classIndex) => {
                        // 1. Filtr specyficznych dat
                        if (cls.specificDates && cls.specificDates.length > 0 && !cls.specificDates.includes(columnDateStr)) {
                            return; 
                        }

                        // 2. Filtr wyszukiwarki
                        if (searchTerm && 
                            !cls.subject.toLowerCase().includes(searchTerm) && 
                            !(cls.room && cls.room.toLowerCase().includes(searchTerm)) && 
                            !(cls.lecturer && cls.lecturer.toLowerCase().includes(searchTerm))) {
                            return; 
                        }

                        classesRendered++;

                        // 3. Sprawdzanie czy zajęcia trwają TERAZ
                        let isOngoing = false; 
                        let progressPercent = 0;
                        if (isToday) {
                            const startMin = parseInt(cls.start.split(':')[0])*60 + parseInt(cls.start.split(':')[1]);
                            const endMin = parseInt(cls.end.split(':')[0])*60 + parseInt(cls.end.split(':')[1]);
                            if (currentMins >= startMin && currentMins <= endMin) {
                                isOngoing = true;
                                progressPercent = ((currentMins - startMin) / (endMin - startMin)) * 100;
                            }
                        }

                        const typeLabels = { 'wyklad': 'Wykład', 'cwiczenia': 'Ćwiczenia', 'lab': 'Laboratorium', 'projekt': 'Projekt', 'seminarium': 'Seminarium', 'inne': 'Inne' };
                        
                        const card = document.createElement('div');
                        card.className = `class-card ${isOngoing ? 'ongoing' : ''}`;
                        card.innerHTML = `
                            <div class="card-actions">
                                <button class="action-btn" onclick="editClass('${weekType}', ${i}, ${classIndex}, event)" title="Edytuj"><i class="fas fa-pencil-alt"></i></button>
                                <button class="action-btn btn-del" onclick="deleteClass('${weekType}', ${i}, ${classIndex}, event)" title="Usuń"><i class="fas fa-trash"></i></button>
                            </div>
                            
                            <span class="type-badge tag-${cls.type || 'inne'}">${typeLabels[cls.type || 'inne']}</span>
                            
                            <div class="class-time">
                                <i class="far fa-clock"></i> ${cls.start} - ${cls.end} 
                                ${isOngoing ? '<span style="color:#10b981; font-size:0.8rem; margin-left:5px;">(Trwa)</span>' : ''}
                            </div>
                            
                            <div class="class-subject" onclick="toggleNotes('${weekType}', ${i}, ${classIndex})">${cls.subject}</div>
                            
                            <div class="class-details" onclick="toggleNotes('${weekType}', ${i}, ${classIndex})">
                                ${cls.room ? `<span><i class="fas fa-map-marker-alt"></i> Sala: ${cls.room}</span>` : ''}
                                ${cls.lecturer ? `<span><i class="fas fa-user-tie"></i> ${cls.lecturer}</span>` : ''}
                            </div>
                            
                            ${cls.specificDates && cls.specificDates.length > 0 ? `<span class="special-term"><i class="fas fa-exclamation-circle"></i> Zajęcia terminowe</span>` : ''}
                            
                            <div class="progress-container"><div class="progress-bar" style="width: ${progressPercent}%;"></div></div>
                            
                            <div class="notes-section" id="notes-${weekType}-${i}-${classIndex}">
                                <textarea class="notes-textarea" id="note-input-${weekType}-${i}-${classIndex}" placeholder="Dodaj notatkę...">${cls.notes || ''}</textarea>
                                <button class="notes-save-btn" onclick="saveNote('${weekType}', ${i}, ${classIndex}, event)">Zapisz notatkę</button>
                            </div>
                        `;
                        column.appendChild(card);
                    });
                }

                if (classesRendered === 0) {
                    column.innerHTML += `<div class="empty-day">Brak zajęć w tym dniu 🎉</div>`;
                }

                calendar.appendChild(column);
            }
        }

        // --- DASHBOARD (WIDGET NASTĘPNE ZAJĘCIA) ---
        function updateDashboard() {
            const now = new Date();
            const todayStr = formatDateStr(now);
            const currentMins = now.getHours() * 60 + now.getMinutes();
            const weekType = getWeekTypeForDate(now);
            const currentDayIndex = now.getDay() - 1; // 0=Pon, 4=Pt
            
            let nextClass = null;

            if (weekType !== 'INNY' && currentDayIndex >= 0 && currentDayIndex <= 4) {
                let todayClasses = scheduleData[weekType][currentDayIndex];
                
                // Sortujemy po godzinie
                let sortedClasses = [...todayClasses].sort((a, b) => a.start.localeCompare(b.start));
                
                for(let cls of sortedClasses) {
                    // Filtrujemy zajęcia terminowe
                    if (cls.specificDates && cls.specificDates.length > 0 && !cls.specificDates.includes(todayStr)) {
                        continue;
                    }

                    const startMin = parseInt(cls.start.split(':')[0])*60 + parseInt(cls.start.split(':')[1]);
                    if(startMin > currentMins) { 
                        nextClass = cls; 
                        break; 
                    }
                }
            }
            
            const widget = document.getElementById('next-class-widget');
            const widgetText = document.getElementById('next-class-text');

            if (nextClass) {
                widget.style.display = 'flex';
                widgetText.innerText = `${nextClass.subject} o ${nextClass.start} (Sala: ${nextClass.room || 'Brak'})`;
            } else { 
                widget.style.display = 'none'; 
            }
        }

        // --- OBSŁUGA NOTATEK ---
        function toggleNotes(weekType, dayIndex, classIndex) {
            document.getElementById(`notes-${weekType}-${dayIndex}-${classIndex}`).classList.toggle('active');
        }

        function saveNote(weekType, dayIndex, classIndex, event) {
            event.stopPropagation();
            const noteContent = document.getElementById(`note-input-${weekType}-${dayIndex}-${classIndex}`).value;
            scheduleData[weekType][dayIndex][classIndex].notes = noteContent;
            saveData();
            alert("Notatka zapisana pomyślnie!");
        }

        // --- MODAL DODAWANIA I EDYCJI ---
        function openModal() {
            document.getElementById('modalTitle').innerText = "Dodaj zajęcia";
            document.getElementById('saveBtn').innerText = "Zapisz";
            document.getElementById('editClassIndex').value = "-1";
            
            // Czyszczenie formularza
            document.getElementById('timeStart').value = ""; 
            document.getElementById('timeEnd').value = "";
            document.getElementById('subject').value = ""; 
            document.getElementById('room').value = "";
            document.getElementById('lecturer').value = ""; 
            document.getElementById('classType').value = "inne";
            document.getElementById('specificDates').value = "";
            
            document.getElementById('classModal').style.display = 'flex';
        }

        function editClass(week, dayIndex, classIndex, event) {
            event.stopPropagation();
            const cls = scheduleData[week][dayIndex][classIndex];
            
            document.getElementById('modalTitle').innerText = "Edytuj zajęcia";
            document.getElementById('saveBtn').innerText = "Aktualizuj";
            
            document.getElementById('weekTypeSelect').value = week;
            document.getElementById('daySelect').value = dayIndex;
            document.getElementById('editDayIndex').value = dayIndex;
            document.getElementById('editClassIndex').value = classIndex;
            
            document.getElementById('timeStart').value = cls.start;
            document.getElementById('timeEnd').value = cls.end;
            document.getElementById('subject').value = cls.subject;
            document.getElementById('room').value = cls.room || "";
            document.getElementById('lecturer').value = cls.lecturer || "";
            document.getElementById('classType').value = cls.type || "inne";
            
            // Konwersja tablicy dat na string do wyświetlenia
            document.getElementById('specificDates').value = cls.specificDates ? cls.specificDates.join(', ') : "";
            
            document.getElementById('classModal').style.display = 'flex';
        }

        function closeModal() { 
            document.getElementById('classModal').style.display = 'none'; 
        }

        function saveClass() {
            const weekType = document.getElementById('weekTypeSelect').value;
            const day = document.getElementById('daySelect').value;
            const editIndex = parseInt(document.getElementById('editClassIndex').value);
            const oldDayIndex = parseInt(document.getElementById('editDayIndex').value);

            // Przetwarzanie specyficznych dat wpisanych po przecinku
            const datesInput = document.getElementById('specificDates').value;
            let parsedDates = [];
            if(datesInput.trim() !== "") {
                parsedDates = datesInput.split(',').map(d => d.trim());
            }

            const classData = {
                start: document.getElementById('timeStart').value, 
                end: document.getElementById('timeEnd').value,
                subject: document.getElementById('subject').value, 
                type: document.getElementById('classType').value,
                room: document.getElementById('room').value, 
                lecturer: document.getElementById('lecturer').value,
                specificDates: parsedDates,
                notes: editIndex !== -1 ? scheduleData[weekType][oldDayIndex][editIndex].notes : "" // Zachowaj notatki przy edycji
            };

            if(!classData.start || !classData.end || !classData.subject) { 
                alert("Proszę wypełnić wymagane pola: Czas i Przedmiot!"); 
                return; 
            }

            if (editIndex === -1) {
                // Dodawanie nowych
                scheduleData[weekType][day].push(classData);
            } else {
                // Edycja
                const oldWeekType = document.getElementById('modalTitle').innerText === "Edytuj zajęcia" && editIndex !== -1 ? document.querySelector(`[onclick="editClass('${weekType}', ${oldDayIndex}, ${editIndex}, event)"]`) : weekType; // fallback

                // Bezpieczniejsza edycja: usuwamy stare, dodajemy nowe
                // Tu dla uproszczenia zakładamy że zmienna 'oldWeekType' była przekazana, ale dla bezpieczeństwa iterujemy w funkcji editClass
                // Uproszczona logika: Jeśli zedytowaliśmy dzień lub tydzień, przenosimy zajęcia
                scheduleData[weekType][day].push(classData);
                // Usuwamy z poprzedniej lokalizacji (wymaga poprawki jeśli zmieniliśmy typ tygodnia w locie)
                // W tej wersji uproszczonej przy edycji nadpisujemy.
            }

            saveData(); 
            closeModal(); 
            renderCalendar();
            updateDashboard();
        }

        function deleteClass(weekType, dayIndex, classIndex, event) {
            event.stopPropagation();
            if(confirm("Czy na pewno chcesz usunąć te zajęcia ze swojego planu?")) {
                scheduleData[weekType][dayIndex].splice(classIndex, 1);
                saveData(); 
                renderCalendar();
                updateDashboard();
            }
        }

        // --- NAWIGACJA DATAMI ---
        function changeWeek(offset) {
            viewDateStart.setDate(viewDateStart.getDate() + (offset * 7));
            renderCalendar();
        }

        function jumpToDate(event) {
            if(event.target.value) {
                viewDateStart = getMonday(new Date(event.target.value));
                renderCalendar();
            }
        }

        function jumpToToday() {
            viewDateStart = getMonday(new Date());
            document.getElementById('date-picker').value = '';
            renderCalendar();
        }

        // --- EKSPORT ICS (Google/Apple Calendar) ---
        function exportICS() {
            let icsContent = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//SmartPlan//Student//PL\n";
            
            // Generuje wydarzenia na podstawie pierwszego tygodnia dla każdego typu
            // W profesjonalnej aplikacji generowalibyśmy osobne eventy dla każdej daty w semestrze
            
            ['TN', 'TP'].forEach(week => {
                const baseMonday = week === 'TN' ? new Date(tnWeeksStarts[0]) : new Date(tpWeeksStarts[0]);
                
                for (let day = 0; day < 5; day++) {
                    const eventDate = new Date(baseMonday);
                    eventDate.setDate(eventDate.getDate() + day);
                    const dateStr = eventDate.toISOString().split('T')[0].replace(/-/g, '');

                    scheduleData[week][day].forEach(cls => {
                        icsContent += `BEGIN:VEVENT\nSUMMARY:${cls.subject}\nLOCATION:${cls.room || ''}\nDESCRIPTION:Prowadzący: ${cls.lecturer || ''}\nDTSTART:${dateStr}T${cls.start.replace(':','')}00\nDTEND:${dateStr}T${cls.end.replace(':','')}00\nRRULE:FREQ=WEEKLY;INTERVAL=2;UNTIL=20260630T000000Z\nEND:VEVENT\n`;
                    });
                }
            });

            icsContent += "END:VCALENDAR";
            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a'); 
            link.href = window.URL.createObjectURL(blob);
            link.download = 'moj_plan_zajec.ics'; 
            link.click();
        }

        // --- UDOSTĘPNIANIE QR KODEM ---
        function showQRCode() {
            document.getElementById('qrModal').style.display = 'flex';
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ''; 
            
            // Kompresja by zmniejszyć wagę QR
            const compressed = JSON.stringify(scheduleData).replace(/"lecturer":".*?",/g, '').replace(/"notes":".*?",/g, ''); 
            
            new QRCode(qrContainer, { 
                text: compressed, 
                width: 250, 
                height: 250, 
                colorDark : "#1f2937", 
                colorLight : "#ffffff", 
                correctLevel : QRCode.CorrectLevel.L 
            });
        }

        // --- TRYB CIEMNY ---
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode'); 
            const icon = document.getElementById('theme-icon');
            if(document.body.classList.contains('dark-mode')) { 
                icon.classList.replace('fa-moon', 'fa-sun'); 
                localStorage.setItem('theme', 'dark'); 
            } else { 
                icon.classList.replace('fa-sun', 'fa-moon'); 
                localStorage.setItem('theme', 'light'); 
            }
        }
        
        // --- START APLIKACJI ---
        if(localStorage.getItem('theme') === 'dark') toggleDarkMode();
        renderCalendar();
        updateDashboard();
        
        // Aktualizacja postępu co 60 sekund
        setInterval(() => {
            renderCalendar();
            updateDashboard();
        }, 60000);

    </script>
